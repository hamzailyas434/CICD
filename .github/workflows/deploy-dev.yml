# AUTO-GENERATED — do not edit manually.
# Source: base-setup.json + project-setup.json
# Regenerate: node scripts/generate-pipeline.js

name: Deploy Dev

on:
  push:
    branches: [dev]
    paths-ignore:
      - '**.md'
      - '.gitignore'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install backend
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Install frontend
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        working-directory: backend
        run: pnpm lint

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Typecheck backend
        working-directory: backend
        run: pnpm typecheck

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm typecheck

      - name: Test backend
        working-directory: backend
        run: pnpm test

      - name: Test frontend
        working-directory: frontend
        run: pnpm test

  build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Build backend
        working-directory: backend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.DEV_VITE_API_URL }}
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/frontend artifacts/backend
          cp -r frontend/dist/. artifacts/frontend/
          cp -r backend/dist     artifacts/backend/dist
          cp backend/package.json backend/pnpm-lock.yaml artifacts/backend/

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend/

      - uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: artifacts/backend/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: Dev_Environment
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend

      - uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: artifacts/backend

      - name: Deploy frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: 22
          source: "artifacts/frontend/*"
          target: "~/test/www/html/static"
          strip_components: 2

      - name: Deploy backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: 22
          source: "artifacts/backend/"
          target: "~/apps/backend"
          strip_components: 2

      - name: Install deps and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: 22
          envs: SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,PORT
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            mkdir -p ~/apps/backend
            cd ~/apps/backend
            pnpm install --prod
            printf "SUPABASE_URL=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\nPORT=%s\n" \
              "$SUPABASE_URL" "$SUPABASE_SERVICE_ROLE_KEY" "$PORT" > .env
            pm2 restart backend || pm2 start dist/index.js --name backend
        env:
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}
          PORT: ${{ secrets.DEV_PORT }}


